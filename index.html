<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Silvia 🎉</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="loading-screen">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading surprise... 🎉</div>
  </div>

  <div id="popup" class="popup" onclick="closePopup()">
    <div class="popup-content">
      <h2 id="popup-text"></h2>
      <button onclick="closePopup()">Tutup</button>
    </div>
  </div>

  <div id="scene"></div>
  <div class="button-group">
    <button id="nextBtn" onclick="nextScene()">➜ &nbsp; Lanjut</button>
    <button onclick="toggleDarkMode()">🌗 &nbsp; Mode</button>
  </div>

  <audio id="bgm" loop>
    <source src="hbd.mp3" type="audio/mpeg">
    Browsermu tidak mendukung elemen audio.
  </audio>

  <script src="script.js"></script>
</body>

</html>
